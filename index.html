<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Takeout Notes">
<title>🥡 Takeout Notes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f6;
    --card: #ffffff;
    --border: #e8e4de;
    --accent: #e08c2e;
    --accent-hover: #c97a1e;
    --accent-light: #fef3e2;
    --text: #1a1917;
    --text-2: #6b6560;
    --text-3: #a09a94;
    --serif: 'DM Serif Display', Georgia, serif;
    --body: 'Lora', Georgia, serif;
    --radius: 16px;
  }

  body {
    background: var(--bg);
    font-family: var(--body);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(250,249,246,0.93);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 0;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .header h1 {
    font-family: var(--serif);
    font-size: 24px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.1;
  }
  .header-sub {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 2px;
    margin-bottom: 12px;
  }
  .search-wrap {
    padding-bottom: 12px;
  }
  .search-input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 9px 14px;
    font-family: var(--body);
    font-size: 14px;
    color: var(--text);
    background: white;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(224,140,46,0.15);
  }
  .search-input::placeholder { color: var(--text-3); }

  /* MAIN */
  .main {
    max-width: 520px;
    margin: 0 auto;
    padding: 16px 16px 80px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 28px;
    padding: 14px 22px;
    font-family: var(--body);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(224,140,46,0.4);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    z-index: 50;
  }
  .fab:active { transform: scale(0.96); background: var(--accent-hover); }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: box-shadow 0.2s;
    cursor: pointer;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
  .card-header {
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .card-emoji { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .card-info { flex: 1; min-width: 0; }
  .card-restaurant {
    font-family: var(--serif);
    font-size: 17px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-dish {
    font-size: 13px;
    color: var(--text-2);
    font-style: italic;
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-date {
    font-size: 11px;
    color: var(--text-3);
    white-space: nowrap;
    flex-shrink: 0;
    padding-top: 3px;
  }
  .card-body {
    padding: 0 16px 14px;
    border-top: 1px solid #f5f3f0;
    margin-top: 0;
    animation: slideDown 0.18s ease;
  }
  .card-body-inner { padding-top: 12px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .tag {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
    font-family: var(--body);
  }
  .tag-meh    { background: #f0f0f0; color: #666; }
  .tag-good   { background: #e8f5e9; color: #2e7d32; }
  .tag-fire   { background: #fdecea; color: #c62828; }
  .tag-repeat { background: #fff8e1; color: #b45309; }
  .card-notes { font-size: 13px; color: var(--text-2); line-height: 1.6; }
  .card-actions {
    display: flex;
    gap: 14px;
    margin-top: 10px;
    align-items: center;
  }
  .edit-btn {
    background: none;
    border: none;
    font-size: 12px;
    color: var(--accent);
    cursor: pointer;
    font-family: var(--body);
    transition: color 0.15s;
    padding: 2px 0;
    font-weight: 500;
  }
  .edit-btn:hover { color: var(--accent-hover); }
  .delete-btn {
    background: none;
    border: none;
    font-size: 12px;
    color: #ccc;
    cursor: pointer;
    font-family: var(--body);
    transition: color 0.15s;
    padding: 2px 0;
  }
  .delete-btn:hover { color: #e53935; }

  /* FORM OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.15s ease;
  }
  .form-sheet {
    background: var(--card);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 36px;
    width: 100%;
    max-width: 520px;
    animation: slideUp 0.22s ease;
    max-height: 92vh;
    overflow-y: auto;
  }
  .form-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    margin-bottom: 18px;
    color: var(--text);
  }
  .form-group { margin-bottom: 12px; }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-3);
    margin-bottom: 6px;
  }
  .form-input, .form-textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 11px 14px;
    font-family: var(--body);
    font-size: 15px;
    color: var(--text);
    background: white;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
  }
  .form-input:focus, .form-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(224,140,46,0.15);
  }
  .form-input::placeholder, .form-textarea::placeholder { color: var(--text-3); }
  .form-textarea { resize: none; line-height: 1.5; }

  .rating-row { display: flex; gap: 8px; }
  .rating-btn {
    flex: 1;
    padding: 10px 6px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: white;
    font-family: var(--body);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.12s;
    color: var(--text-2);
  }
  .rating-btn.active {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--text);
    font-weight: 500;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 4px 0;
  }
  .checkbox-row input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .checkbox-row span { font-size: 14px; color: var(--text); }

  .form-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-save {
    flex: 1;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 14px;
    font-family: var(--body);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-save:active { transform: scale(0.97); }
  .btn-save:disabled { background: #ddd; color: #aaa; cursor: default; }
  .btn-cancel {
    padding: 14px 20px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: white;
    font-family: var(--body);
    font-size: 15px;
    color: var(--text-2);
    cursor: pointer;
    transition: background 0.12s;
  }
  .btn-cancel:active { background: #f5f5f5; }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 64px 20px;
    color: var(--text-3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; font-style: italic; }

  /* ANIMATIONS */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>

<div class="header">
  <div style="max-width:520px;margin:0 auto;">
    <div class="header-row">
      <div>
        <h1>🥡 Takeout Notes</h1>
        <p class="header-sub" id="count-label">0 saved orders</p>
      </div>
    </div>
    <div class="search-wrap" id="search-wrap" style="display:none;">
      <input class="search-input" id="search" placeholder="Search restaurants or dishes…" oninput="render()" autocomplete="off">
    </div>
  </div>
</div>

<div class="main" id="list"></div>

<button class="fab" onclick="openForm()">
  <span style="font-size:18px;">+</span> Log order
</button>

<!-- FORM OVERLAY -->
<div class="overlay" id="overlay" style="display:none;" onclick="handleOverlayClick(event)">
  <div class="form-sheet" id="form-sheet">
    <div class="form-title" id="form-title">Log an order</div>

    <div class="form-group">
      <label class="form-label">Restaurant</label>
      <input class="form-input" id="f-restaurant" placeholder="e.g. Golden Dragon" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Dish or order</label>
      <input class="form-input" id="f-dish" placeholder="e.g. Pad See Ew, extra tofu" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="f-notes" rows="3" placeholder="Spice level, customizations, what was great…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Rating</label>
      <div class="rating-row">
        <button class="rating-btn" data-r="0" onclick="setRating(0)">😐 Meh</button>
        <button class="rating-btn active" data-r="1" onclick="setRating(1)">👍 Good</button>
        <button class="rating-btn" data-r="2" onclick="setRating(2)">🔥 Amazing</button>
      </div>
    </div>
    <div class="form-group">
      <label class="checkbox-row">
        <input type="checkbox" id="f-repeat" checked>
        <span>Would order again</span>
      </label>
    </div>
    <div class="form-actions">
      <button class="btn-save" id="btn-save" onclick="saveEntry()">Save</button>
      <button class="btn-cancel" onclick="closeForm()">Cancel</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'takeout-notes-v1';
  const RATINGS = ['😐','👍','🔥'];
  const RATING_LABELS = ['Meh','Good','Amazing'];
  const RATING_TAGS = ['tag-meh','tag-good','tag-fire'];
  let entries = [];
  let expandedId = null;
  let currentRating = 1;
  let editingId = null;

  function load() {
    try { entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { entries = []; }
  }

  function persist() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }

  function render() {
    const q = (document.getElementById('search')?.value || '').toLowerCase();
    const filtered = q
      ? entries.filter(e =>
          e.restaurant.toLowerCase().includes(q) ||
          e.dish.toLowerCase().includes(q) ||
          (e.notes||'').toLowerCase().includes(q))
      : entries;

    const list = document.getElementById('list');
    const countLabel = document.getElementById('count-label');
    const searchWrap = document.getElementById('search-wrap');

    countLabel.textContent = `${entries.length} saved ${entries.length === 1 ? 'order' : 'orders'}`;
    searchWrap.style.display = entries.length > 2 ? 'block' : 'none';

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">🍜</div><p class="empty-text">${q ? 'No matches found.' : 'No orders yet. Tap + to log your first!'}</p></div>`;
      return;
    }

    list.innerHTML = filtered.map(e => {
      const isOpen = expandedId === e.id;
      const tagClass = RATING_TAGS[e.rating] ?? 'tag-good';
      const ratingLabel = RATING_LABELS[e.rating] ?? 'Good';
      const emoji = RATINGS[e.rating] ?? '👍';
      return `
        <div class="card" onclick="toggleCard(${e.id})">
          <div class="card-header">
            <div class="card-emoji">${emoji}</div>
            <div class="card-info">
              <div class="card-restaurant">${esc(e.restaurant)}</div>
              <div class="card-dish">${esc(e.dish)}</div>
            </div>
            <div class="card-date">${formatDate(e.date)}</div>
          </div>
          ${isOpen ? `
          <div class="card-body">
            <div class="card-body-inner">
              <div class="tags">
                <span class="tag ${tagClass}">${ratingLabel}</span>
                ${e.wouldOrder ? '<span class="tag tag-repeat">Would order again</span>' : ''}
              </div>
              ${e.notes ? `<div class="card-notes">${esc(e.notes)}</div>` : ''}
              <div class="card-actions">
                <button class="edit-btn" onclick="editEntry(event, ${e.id})">Edit</button>
                <button class="delete-btn" onclick="deleteEntry(event, ${e.id})">Delete</button>
              </div>
            </div>
          </div>` : ''}
        </div>`;
    }).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function toggleCard(id) {
    expandedId = expandedId === id ? null : id;
    render();
  }

  function deleteEntry(e, id) {
    e.stopPropagation();
    entries = entries.filter(x => x.id !== id);
    if (expandedId === id) expandedId = null;
    persist();
    render();
  }

  // FORM
  function openForm() {
    editingId = null;
    document.getElementById('form-title').textContent = 'Log an order';
    document.getElementById('f-restaurant').value = '';
    document.getElementById('f-dish').value = '';
    document.getElementById('f-notes').value = '';
    document.getElementById('f-repeat').checked = true;
    setRating(1);
    document.getElementById('overlay').style.display = 'flex';
    setTimeout(() => document.getElementById('f-restaurant').focus(), 100);
  }

  function editEntry(e, id) {
    e.stopPropagation();
    const entry = entries.find(x => x.id === id);
    if (!entry) return;
    editingId = id;
    document.getElementById('form-title').textContent = 'Edit order';
    document.getElementById('f-restaurant').value = entry.restaurant;
    document.getElementById('f-dish').value = entry.dish;
    document.getElementById('f-notes').value = entry.notes || '';
    document.getElementById('f-repeat').checked = entry.wouldOrder;
    setRating(entry.rating ?? 1);
    document.getElementById('overlay').style.display = 'flex';
    setTimeout(() => document.getElementById('f-restaurant').focus(), 100);
  }

  function closeForm() {
    document.getElementById('overlay').style.display = 'none';
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeForm();
  }

  function setRating(r) {
    currentRating = r;
    document.querySelectorAll('.rating-btn').forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.r) === r);
    });
  }

  function saveEntry() {
    const restaurant = document.getElementById('f-restaurant').value.trim();
    const dish = document.getElementById('f-dish').value.trim();
    if (!restaurant || !dish) return;

    if (editingId !== null) {
      entries = entries.map(x => x.id === editingId ? {
        ...x, restaurant, dish,
        notes: document.getElementById('f-notes').value.trim(),
        rating: currentRating,
        wouldOrder: document.getElementById('f-repeat').checked
      } : x);
    } else {
      const entry = {
        id: Date.now(),
        date: new Date().toISOString(),
        restaurant, dish,
        notes: document.getElementById('f-notes').value.trim(),
        rating: currentRating,
        wouldOrder: document.getElementById('f-repeat').checked
      };
      entries.unshift(entry);
    }
    persist();
    closeForm();
    render();
  }

  // Enter key to save
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('overlay').style.display !== 'none') {
      const active = document.activeElement;
      if (active && active.tagName !== 'TEXTAREA') saveEntry();
    }
    if (e.key === 'Escape') closeForm();
  });

  load();
  render();
</script>
</body>
</html>
